<div *ngIf="toast$ | async as toast" class="fixed top-5 right-5 z-50">
  <div
    class="px-6 py-3 rounded shadow-lg text-white"
    [ngClass]="{
      'bg-green-600': toast.type === 'success',
      'bg-red-600': toast.type === 'error',
      'bg-blue-600': toast.type === 'info',
    }"
  >
    {{ toast.text }}
  </div>
</div>
