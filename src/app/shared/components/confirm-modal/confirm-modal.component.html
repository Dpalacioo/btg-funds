<div
  class="fixed inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-50 animate-fadeIn"
>
  <div
    class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-96 max-w-[90%] p-6 border border-gray-200 dark:border-gray-700 transform transition-all duration-300 animate-scaleIn"
  >
    <h2 class="text-xl font-bold mb-4 text-gray-900 dark:text-gray-100">
      {{ title }}
    </h2>

    <p *ngIf="message" class="text-gray-600 dark:text-gray-300 mb-4">
      {{ message }}
    </p>

    <ng-content></ng-content>

    <div class="flex justify-end gap-3 mt-6">
      <button
        (click)="cancel.emit()"
        class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition"
      >
        {{ "modal.cancel" | translate }}
      </button>

      <button
        (click)="confirm.emit()"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition"
      >
        {{ "modal.confirm" | translate }}
      </button>
    </div>
  </div>
</div>
