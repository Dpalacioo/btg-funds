<header class="bg-white shadow-md">
  <div
    class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3 lg:gap-0"
  >
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold text-blue-600">BTG Funds</h1>

      <div class="text-gray-800 font-semibold lg:hidden">
        Saldo:
        <span class="text-green-600">
          {{ balance$ | async | currency: "COP" : "symbol" : "1.0-0" }}
        </span>
      </div>
    </div>

    <nav
      class="flex justify-center lg:justify-start gap-4 md:gap-6 text-gray-700 font-medium"
    >
      <a routerLink="/funds" routerLinkActive="text-blue-600"> Fondos </a>

      <a routerLink="/transactions" routerLinkActive="text-blue-600">
        Historial
      </a>

      <a
        routerLink="/my-funds"
        routerLinkActive="text-blue-600"
        class="hover:text-blue-600 transition"
      >
        Mis Fondos
      </a>
    </nav>

    <div class="text-gray-800 font-semibold hidden lg:block">
      Saldo:
      <span class="text-green-600">
        {{ balance$ | async | currency: "COP" : "symbol" : "1.0-0" }}
      </span>
    </div>
  </div>
</header>
