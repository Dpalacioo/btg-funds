<div class="p-6 md:p-10">
  <h1 class="text-3xl font-bold mb-8">Mis Fondos</h1>

  <ng-container *ngIf="userFunds$ | async as funds">
    <div
      *ngIf="funds.length > 0; else emptyFunds"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
    >
      <div
        *ngFor="let fund of funds"
        class="bg-white border border-gray-200 rounded-lg p-5 hover:border-gray-300 hover:bg-gray-50 hover:shadow-md transition-all duration-300 flex flex-col justify-between"
      >
        <div class="space-y-4">
          <h2 class="font-semibold text-gray-900 text-base truncate">
            {{ fund.name }}
          </h2>

          <div class="flex justify-between items-start gap-4">
            <div>
              <p
                class="text-xs uppercase tracking-wide text-gray-400 font-medium"
              >
                Categoría
              </p>

              <span
                class="inline-block text-xs font-semibold px-2 py-1 rounded-full mt-1"
                [ngClass]="{
                  'bg-blue-100 text-blue-700': fund.category === 'FPV',
                  'bg-green-100 text-green-700': fund.category === 'FIC',
                }"
              >
                {{ fund.category }}
              </span>
            </div>

            <div class="text-right">
              <p
                class="text-xs uppercase tracking-wide text-gray-400 font-medium"
              >
                Monto invertido
              </p>

              <p class="font-semibold text-gray-900 text-lg mt-1">
                {{ fund.minAmount | currency: "COP" : "symbol" : "1.0-0" }}
              </p>
            </div>
          </div>
        </div>

        <button
          (click)="openCancelModal(fund)"
          class="mt-5 w-full bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition"
        >
          Cancelar
        </button>
      </div>
    </div>
  </ng-container>

  <ng-template #emptyFunds>
    <div class="text-center py-12 text-gray-500">
      Aún no estás suscrito a ningún fondo.
    </div>
  </ng-template>
</div>

<app-confirm-modal
  *ngIf="showConfirmModal"
  title="Cancelar participación"
  [message]="'¿Desea cancelar su participación en este fondo?'"
  (confirm)="confirmCancel()"
  (cancel)="closeModal()"
></app-confirm-modal>
