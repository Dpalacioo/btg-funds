<div
  class="grid grid-cols-1 md:grid-cols-12 items-center gap-2 md:gap-4 mb-2 bg-white px-4 md:px-6 py-4 md:py-2 rounded-lg border border-gray-200 hover:border-gray-300 hover:bg-gray-50 hover:shadow-md transition-all duration-300"
>
  <div class="md:col-span-5">
    <div class="font-semibold text-gray-900 break-words">
      {{ fund.name }}
    </div>
  </div>

  <div class="flex justify-between items-center md:contents">
    <div class="md:col-span-2">
      <span
        class="text-xs font-semibold px-2 py-1 rounded-full"
        [ngClass]="{
          'bg-blue-100 text-blue-700': fund.category === 'FPV',
          'bg-green-100 text-green-700': fund.category === 'FIC',
        }"
      >
        {{ fund.category }}
      </span>
    </div>

    <div class="text-gray-900 font-semibold md:col-span-3">
      {{ fund.minAmount | currency: "COP" : "symbol" : "1.0-0" }}
    </div>
  </div>

  <div class="md:col-span-2 flex md:justify-end mt-2 md:mt-0">
    <button
      (click)="openConfirmModal()"
      [disabled]="loading"
      class="w-full md:w-[150px] bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition disabled:opacity-50"
    >
      {{ loading ? "Procesando..." : "Suscribirse" }}
    </button>
  </div>
</div>

<app-confirm-modal
  *ngIf="showConfirmModal"
  title="Confirmar suscripción"
  (confirm)="confirmSubscription()"
  (cancel)="closeConfirmModal()"
>
  <form [formGroup]="subscriptionForm" class="space-y-4">
    <label class="block text-sm font-medium">Email de notificación</label>

    <input
      type="email"
      formControlName="email"
      class="w-full border rounded px-3 py-2"
      placeholder="correo@ejemplo.com"
    />

    <p
      *ngIf="
        subscriptionForm.get('email')?.invalid &&
        subscriptionForm.get('email')?.touched
      "
      class="text-red-500 text-sm"
    >
      Debe ingresar un email válido
    </p>

    <div *ngIf="loading" class="text-blue-600 text-sm">
      Procesando suscripción...
    </div>
  </form>
</app-confirm-modal>
