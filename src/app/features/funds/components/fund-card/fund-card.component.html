<div
  class="grid grid-cols-1 md:grid-cols-12 items-center gap-2 md:gap-4 mb-2 bg-white dark:bg-gray-800 px-4 md:px-6 py-4 md:py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 hover:shadow-md transition-all duration-300"
>
  <div class="md:col-span-5">
    <div class="font-semibold text-gray-900 dark:text-gray-100 break-words">
      {{ fund.name }}
    </div>
  </div>

  <div class="flex justify-between items-center md:contents">
    <div class="md:col-span-2">
      <span
        class="text-xs font-semibold px-2 py-1 rounded-full"
        [ngClass]="{
          'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300':
            fund.category === 'FPV',
          'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300':
            fund.category === 'FIC',
        }"
      >
        {{ fund.category }}
      </span>
    </div>

    <div class="text-gray-900 dark:text-gray-100 font-semibold md:col-span-3">
      {{ fund.minAmount | currency: "COP" : "symbol" : "1.0-0" }}
    </div>
  </div>

  <div class="md:col-span-2 flex md:justify-end mt-2 md:mt-0">
    <button
      (click)="openConfirmModal()"
      [disabled]="loading"
      class="w-full md:w-[150px] bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition disabled:opacity-50"
    >
      {{
        loading
          ? ("modal.processing" | translate)
          : ("funds.subscribe" | translate)
      }}
    </button>
  </div>
</div>

<app-confirm-modal
  *ngIf="showConfirmModal"
  [title]="'modal.confirmSubscription' | translate"
  (confirm)="confirmSubscription()"
  (cancel)="closeConfirmModal()"
>
  <form [formGroup]="subscriptionForm" class="space-y-4">
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">
      {{ "modal.notificationEmail" | translate }}
    </label>

    <input
      type="email"
      formControlName="email"
      class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded px-3 py-2"
      placeholder="correo@ejemplo.com"
    />

    <p
      *ngIf="
        subscriptionForm.get('email')?.invalid &&
        subscriptionForm.get('email')?.touched
      "
      class="text-red-500 text-sm"
    >
      {{ "errors.invalidEmail" | translate }}
    </p>

    <div *ngIf="loading" class="text-blue-600 dark:text-blue-400 text-sm">
      {{ "modal.processing" | translate }}
    </div>
  </form>
</app-confirm-modal>
