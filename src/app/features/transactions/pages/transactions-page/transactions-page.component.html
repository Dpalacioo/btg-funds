<div class="p-10">
  <h1 class="text-3xl font-bold mb-6">Historial de Transacciones</h1>

  <div class="overflow-x-auto">
    <table class="min-w-full bg-white shadow rounded-lg">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-4 py-3 text-left">Fondo</th>
          <th class="px-4 py-3 text-left">Tipo</th>
          <th class="px-4 py-3 text-left">Monto</th>
          <th class="px-4 py-3 text-left">Fecha</th>
        </tr>
      </thead>

      <tbody>
        <ng-container *ngIf="transactions.length > 0; else emptyTransactions">

          <tr *ngFor="let transaction of transactions" class="border-t">
            <td class="px-4 py-3">
              {{ transaction.fundName }}
            </td>

            <td class="px-4 py-3">
              {{ transaction.type }}
            </td>

            <td class="px-4 py-3">
              {{ transaction.amount | currency:'COP':'symbol':'1.0-0' }}
            </td>

            <td class="px-4 py-3">
              {{ transaction.date | date:'medium' }}
            </td>
          </tr>

        </ng-container>

        <ng-template #emptyTransactions>
          <tr>
            <td colspan="4" class="text-center py-10 text-gray-500">
              No hay transacciones registradas aún.
            </td>
          </tr>
        </ng-template>

      </tbody>
    </table>
  </div>
</div>
